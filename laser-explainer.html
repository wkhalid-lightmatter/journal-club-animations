<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How a Sub-Hz Laser Works — Step by Step</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0a0f1e;
    color: #f1f5f9;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 22px 14px 36px;
  }
  .page { max-width: 1000px; width: 100%; }
  h1 {
    font-size: 1.65rem; font-weight: 700; color: #38bdf8;
    margin-bottom: 4px;
  }
  .paper-ref { font-size: 0.95rem; color: #64748b; margin-bottom: 18px; }

  /* Step dots */
  .step-dots {
    display: flex; gap: 9px; justify-content: center; margin-bottom: 16px;
  }
  .dot {
    width: 38px; height: 7px; border-radius: 4px;
    background: #1e293b; border: 1px solid #334155;
    cursor: pointer; transition: all 0.2s;
  }
  .dot.active { background: #38bdf8; border-color: #38bdf8; }
  .dot.done { background: #0ea5e9; border-color: #0ea5e9; opacity: 0.55; }

  /* Canvas */
  .canvas-wrap {
    background: #0f172a;
    border: 1px solid #1e293b;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 14px;
    position: relative;
  }
  canvas { display: block; width: 100%; }

  /* Interactive controls */
  .controls {
    background: #15233b;
    border: 1px solid #1e3a5f;
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 14px;
    display: none;
  }
  .controls.active { display: block; }
  .ctrl-tag {
    display: inline-block; font-size: 0.78rem; font-weight: 700;
    color: #38bdf8; letter-spacing: 0.08em; text-transform: uppercase;
    margin-bottom: 10px;
  }
  .ctrl-row { display: flex; align-items: center; gap: 16px; }
  .ctrl-row label { font-size: 1.05rem; color: #bae6fd; font-weight: 600; white-space: nowrap; min-width: 175px; }
  .ctrl-row input[type=range] { flex: 1; accent-color: #38bdf8; height: 7px; cursor: pointer; }
  .ctrl-val { font-family: ui-monospace, monospace; font-size: 1.2rem; color: #f1f5f9; min-width: 120px; text-align: right; font-weight: 700; }
  .ctrl-hint { font-size: 0.92rem; color: #64748b; margin-top: 11px; line-height: 1.5; }
  .ctrl-hint b { color: #94a3b8; }

  /* Text area */
  .step-text {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 10px;
    padding: 18px 22px;
    margin-bottom: 16px;
  }
  .step-num { font-size: 0.85rem; color: #38bdf8; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 7px; }
  .step-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 11px; }
  .step-desc { font-size: 1.1rem; color: #dbe4ef; line-height: 1.7; }
  .key-box {
    margin-top: 14px; padding: 12px 18px;
    background: #0f172a; border-left: 4px solid #38bdf8;
    border-radius: 0 6px 6px 0; font-size: 1.02rem;
    color: #7dd3fc; font-family: ui-monospace, monospace;
    transition: border-color 0.3s, color 0.3s; line-height: 1.5;
  }

  /* Nav */
  .nav {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
  }
  .btn {
    padding: 12px 34px; border-radius: 8px; border: none; font-size: 1.08rem;
    font-weight: 700; cursor: pointer; transition: all 0.15s; min-width: 130px;
  }
  #btn-prev { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
  #btn-prev:hover:not(:disabled) { background: #334155; color: #f1f5f9; }
  #btn-prev:disabled { opacity: 0.35; cursor: default; }
  #btn-next { background: #0ea5e9; color: #fff; }
  #btn-next:hover { background: #38bdf8; }
  #btn-next.finish { background: #22c55e; }
  #btn-next.finish:hover { background: #4ade80; }
  .step-counter { font-size: 1.05rem; color: #64748b; font-weight: 600; }
  sup { font-size: 0.65em; vertical-align: super; }
  sub { font-size: 0.65em; vertical-align: sub; }
</style>
</head>
<body>
<div class="page">
  <h1>Building a Sub-Hz Laser: From Diode to External Cavity</h1>
  <p class="paper-ref">Based on Dong et al., <em>Optica</em> 12(8), 1171 (2025) — steps 3–5 are interactive (drag the sliders)</p>

  <div class="step-dots" id="step-dots"></div>

  <div class="canvas-wrap">
    <canvas id="c" width="960" height="470"></canvas>
  </div>

  <div class="controls" id="controls"></div>

  <div class="step-text">
    <div class="step-num" id="step-num">STEP 1 OF 6</div>
    <div class="step-title" id="step-title">The Bare DFB Laser</div>
    <div class="step-desc" id="step-desc"></div>
    <div class="key-box" id="key-box"></div>
  </div>

  <div class="nav">
    <button class="btn" id="btn-prev">← Back</button>
    <span class="step-counter" id="step-counter">1 / 6</span>
    <button class="btn" id="btn-next">Next →</button>
  </div>
</div>

<script>
// ── Colors ────────────────────────────────────────────────────────────────
const C = {
  bg:'#0f172a', panel:'#1e293b', border:'#334155',
  blue:'#38bdf8', sky:'#0ea5e9', green:'#22c55e', greenL:'#4ade80',
  yellow:'#fbbf24', orange:'#f97316', red:'#f87171', violet:'#a78bfa',
  text:'#f1f5f9', muted:'#94a3b8', faint:'#64748b',
  gold:'#d97706', chip:'#0c2340', chipBorder:'#2b7fc4',
  si3n4:'#2d1b69', si3n4B:'#7c3aed', dbrB:'#22c55e',
};

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ── Drawing helpers ────────────────────────────────────────────────────────
function rr(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y); ctx.closePath();
}
function label(txt, x, y, color, size, align) {
  ctx.fillStyle = color || C.muted;
  ctx.font = (size || 14) + 'px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = align || 'center';
  ctx.fillText(txt, x, y);
}
function boldLabel(txt, x, y, color, size, align) {
  ctx.fillStyle = color || C.text;
  ctx.font = 'bold ' + (size || 16) + 'px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = align || 'center';
  ctx.fillText(txt, x, y);
}
function glowCircle(x, y, r, color, alpha) {
  const g = ctx.createRadialGradient(x, y, 0, x, y, r*2.6);
  let rgb = color;
  if (color[0] === '#') {
    const n = parseInt(color.slice(1), 16);
    rgb = `rgb(${(n>>16)&255},${(n>>8)&255},${n&255})`;
  }
  g.addColorStop(0, rgb.replace('rgb', 'rgba').replace(')', `,${alpha})`));
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(x, y, r*2.6, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = color; ctx.globalAlpha = alpha;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
}
function photonsLine(x1, y1, x2, y2, t, speed, color, n, spread) {
  speed = speed || 0.0004; n = n || 5; spread = spread || 0;
  for (let i = 0; i < n; i++) {
    const frac = ((t*speed + i/n) % 1);
    const px = x1 + frac*(x2-x1);
    const py = y1 + frac*(y2-y1) + spread*Math.sin(i*1.7 + frac*3);
    const alpha = Math.min(1, Math.sin(frac*Math.PI)*1.6);
    glowCircle(px, py, 3.5, color, alpha*0.85);
  }
}
function spiralPoints(cx, cy, r0, r1, turns, npts) {
  const pts = [];
  for (let i = 0; i <= npts; i++) {
    const a = (i/npts)*turns*2*Math.PI;
    const r = r0 + (r1-r0)*(i/npts);
    pts.push([cx + r*Math.cos(a - Math.PI/2), cy + r*Math.sin(a - Math.PI/2)]);
  }
  return pts;
}
function drawSpiralPath(pts, color, lw) {
  ctx.strokeStyle = color; ctx.lineWidth = lw || 2;
  ctx.beginPath();
  pts.forEach((p, i) => i === 0 ? ctx.moveTo(p[0], p[1]) : ctx.lineTo(p[0], p[1]));
  ctx.stroke();
}
function photonAlongPath(pts, frac, color, r) {
  const idx = Math.min(pts.length-2, Math.floor(frac*(pts.length-1)));
  const t2 = frac*(pts.length-1) - idx;
  const p = pts[idx], q = pts[idx+1];
  glowCircle(p[0]+t2*(q[0]-p[0]), p[1]+t2*(q[1]-p[1]), r || 4, color, 0.9);
}
function arrow(x1, y1, x2, y2, color, lw, dash) {
  ctx.strokeStyle = color; ctx.lineWidth = lw || 1.5;
  if (dash) ctx.setLineDash(dash);
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  ctx.setLineDash([]);
  const a = Math.atan2(y2-y1, x2-x1);
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - 10*Math.cos(a-0.4), y2 - 10*Math.sin(a-0.4));
  ctx.lineTo(x2 - 10*Math.cos(a+0.4), y2 - 10*Math.sin(a+0.4));
  ctx.closePath(); ctx.fill();
}

// ── DFB gain chip ──────────────────────────────────────────────────────────
function drawDFBChip(x, y, w, h, gratingColor) {
  ctx.fillStyle = C.chip; rr(x, y, w, h, 5); ctx.fill();
  ctx.strokeStyle = C.chipBorder; ctx.lineWidth = 2; rr(x, y, w, h, 5); ctx.stroke();
  // active region
  const arY = y + h*0.40, arH = h*0.20;
  ctx.fillStyle = 'rgba(251,191,36,0.18)';
  ctx.fillRect(x+5, arY, w-10, arH);
  ctx.strokeStyle = 'rgba(251,191,36,0.6)'; ctx.lineWidth = 1.2;
  ctx.strokeRect(x+5, arY, w-10, arH);
  // grating
  ctx.strokeStyle = (gratingColor || 'rgba(56,189,248,0.3)'); ctx.lineWidth = 1;
  for (let i = 1; i < 18; i++) {
    const gx = x + (i/18)*w;
    ctx.beginPath(); ctx.moveTo(gx, y+7); ctx.lineTo(gx, y+h-7); ctx.stroke();
  }
  // top contact
  const grd = ctx.createLinearGradient(x, y-16, x, y-2);
  grd.addColorStop(0, '#92400e'); grd.addColorStop(1, C.gold);
  ctx.fillStyle = grd; rr(x-4, y-18, w+8, 15, 2); ctx.fill();
  ctx.fillStyle = '#78350f'; ctx.fillRect(x-4, y+h+2, w+8, 7);
}

// ── DBR grating block ──────────────────────────────────────────────────────
function drawDBRblock(x, y, w, h, t, strength) {
  strength = strength == null ? 1 : strength;
  ctx.fillStyle = 'rgba(26,46,26,0.92)'; rr(x, y, w, h, 4); ctx.fill();
  ctx.strokeStyle = C.dbrB; ctx.lineWidth = 2; rr(x, y, w, h, 4); ctx.stroke();
  const n = Math.round(6 + strength*12);
  for (let i = 0; i <= n; i++) {
    const gx = x + (i/n)*w;
    const ph = (t*0.001 + i*0.5) % 1;
    ctx.strokeStyle = `rgba(34,197,94,${0.25 + ph*0.2})`; ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.moveTo(gx, y+5); ctx.lineTo(gx, y+h-5); ctx.stroke();
  }
}

// ── Lorentzian spectrum ────────────────────────────────────────────────────
function drawLorentzian(x, y, w, h, normFwhm, color, fwhmLabel, titleTxt) {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.32)'; rr(x, y, w, h, 5); ctx.fill();
  ctx.strokeStyle = '#334155'; ctx.lineWidth = 1; rr(x, y, w, h, 5); ctx.stroke();
  const px = f => x + w/2 + f*w;
  const lor = f => 1/(1 + Math.pow(f/normFwhm, 2));
  const top = 26;
  ctx.beginPath(); ctx.moveTo(px(-0.5), y+h-10);
  for (let i = 0; i <= 120; i++) {
    const f = -0.5 + i/120;
    ctx.lineTo(px(f), y+h-10 - lor(f)*(h-top)*0.9);
  }
  ctx.lineTo(px(0.5), y+h-10); ctx.closePath();
  ctx.fillStyle = color + '28'; ctx.fill();
  ctx.strokeStyle = color; ctx.lineWidth = 2.4;
  ctx.beginPath();
  for (let i = 0; i <= 120; i++) {
    const f = -0.5 + i/120;
    const yy = y+h-10 - lor(f)*(h-top)*0.9;
    i === 0 ? ctx.moveTo(px(f), yy) : ctx.lineTo(px(f), yy);
  }
  ctx.stroke();
  // FWHM bracket
  const halfY = y+h-10 - (h-top)*0.45;
  if (normFwhm*w > 6) {
    ctx.strokeStyle = C.yellow; ctx.lineWidth = 1.8;
    ctx.beginPath(); ctx.moveTo(px(-normFwhm), halfY-5); ctx.lineTo(px(-normFwhm), halfY+5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px(normFwhm), halfY-5); ctx.lineTo(px(normFwhm), halfY+5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px(-normFwhm), halfY); ctx.lineTo(px(normFwhm), halfY); ctx.stroke();
  }
  if (fwhmLabel) { ctx.fillStyle = C.yellow; ctx.font = 'bold 14px "Segoe UI",sans-serif'; ctx.textAlign='center'; ctx.fillText('Δν = '+fwhmLabel, x+w/2, y+h-2); }
  if (titleTxt) boldLabel(titleTxt, x+w/2, y-7, C.muted, 13);
  ctx.restore();
}

// ── Generic mini line-plot ─────────────────────────────────────────────────
function miniPlot(x, y, w, h, fn, xmin, xmax, color, opts) {
  opts = opts || {};
  ctx.fillStyle = 'rgba(0,0,0,0.3)'; rr(x, y, w, h, 5); ctx.fill();
  ctx.strokeStyle = '#334155'; ctx.lineWidth = 1; rr(x, y, w, h, 5); ctx.stroke();
  // sample to get range
  let lo = Infinity, hi = -Infinity, vals = [];
  const N = 120;
  for (let i = 0; i <= N; i++) {
    const xx = xmin + (xmax-xmin)*i/N;
    const v = fn(xx); vals.push(v);
    if (v < lo) lo = v; if (v > hi) hi = v;
  }
  if (opts.ymin != null) lo = opts.ymin;
  if (opts.ymax != null) hi = opts.ymax;
  const pad = 14;
  const X = i => x + pad + (w-2*pad)*i/N;
  const Y = v => y + h - pad - (h-2*pad)*(v-lo)/(hi-lo || 1);
  ctx.strokeStyle = color; ctx.lineWidth = 2.4; ctx.beginPath();
  vals.forEach((v, i) => i===0 ? ctx.moveTo(X(i), Y(v)) : ctx.lineTo(X(i), Y(v)));
  ctx.stroke();
  // markers
  (opts.markers || []).forEach(m => {
    const i = (m.x - xmin)/(xmax-xmin)*N;
    const mx = x + pad + (w-2*pad)*i/N;
    const my = Y(fn(m.x));
    ctx.setLineDash([3,3]); ctx.strokeStyle = m.color || C.faint; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(mx, y+h-pad); ctx.lineTo(mx, my); ctx.stroke(); ctx.setLineDash([]);
    glowCircle(mx, my, 4, m.color || C.muted, 0.9);
    if (m.label) label(m.label, mx, my-9, m.color || C.muted, 11);
  });
  // current value dot
  if (opts.cur != null) {
    const i = (opts.cur - xmin)/(xmax-xmin)*N;
    const cx = x + pad + (w-2*pad)*i/N;
    const cy = Y(fn(opts.cur));
    glowCircle(cx, cy, 6, opts.curColor || C.text, 0.95);
    ctx.strokeStyle = '#f1f5f9'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(cx, cy, 6, 0, Math.PI*2); ctx.stroke();
  }
  if (opts.title) boldLabel(opts.title, x+w/2, y-7, C.muted, 13);
  if (opts.xlabel) label(opts.xlabel, x+w/2, y+h-2, C.faint, 11);
}

// ── Side info panel ────────────────────────────────────────────────────────
function infoPanel(x, y, w, h, title, rows, accent) {
  ctx.fillStyle = 'rgba(30,41,59,0.92)'; rr(x, y, w, h, 7); ctx.fill();
  ctx.strokeStyle = accent || C.border; ctx.lineWidth = 1.4; rr(x, y, w, h, 7); ctx.stroke();
  boldLabel(title, x+w/2, y+24, accent || C.blue, 15);
  let yy = y + 52;
  rows.forEach(r => {
    if (r.gap) { yy += r.gap; return; }
    ctx.textAlign = 'left'; ctx.fillStyle = C.muted; ctx.font = '14px "Segoe UI",sans-serif';
    ctx.fillText(r[0], x+16, yy);
    ctx.textAlign = 'right'; ctx.fillStyle = r[2] || C.text;
    ctx.font = 'bold 14px "Segoe UI",sans-serif';
    ctx.fillText(r[1], x+w-16, yy);
    yy += r.h || 27;
  });
  ctx.textAlign = 'center';
}

function fmtHz(hz) {
  if (hz < 0.001) return (hz*1e6).toFixed(0)+' µHz';
  if (hz < 1) return (hz*1000).toFixed(0)+' mHz';
  if (hz < 1000) return hz < 10 ? hz.toFixed(2)+' Hz' : hz.toFixed(0)+' Hz';
  if (hz < 1e6) return (hz/1e3).toFixed(1)+' kHz';
  return (hz/1e6).toFixed(2)+' MHz';
}

// ── STEPS ───────────────────────────────────────────────────────────────────
const STEPS = [
  // ===== STEP 1 — Bare DFB =====
  {
    title: 'The Bare DFB Laser — the Gain Source',
    keyColor: C.red,
    key: 'Free-running Δν ≈ 71 kHz  ·  τ_ph ≈ a few ps  ·  α_H (LEF) = 2.3',
    desc: 'We start with a commercial Distributed-Feedback (DFB) diode laser. Current is injected through the top contact into the quantum-well (QW) active region, where electrons and holes recombine to emit photons. An internal grating selects a single wavelength (1558 nm) and acts as a built-in mirror. But the cavity is only ~300 µm long, so photons escape after a few picoseconds. That short photon lifetime — amplified by the linewidth-enhancement factor α_H = 2.3 — leaves a broad, noisy linewidth of ~71 kHz. This chip just provides gain; on its own it is far too noisy.',
    draw(t) {
      ctx.fillStyle = C.bg; ctx.fillRect(0,0,W,H);
      boldLabel('Free-running DFB diode laser', 230, 36, C.blue, 18);

      const cx=70, cy=150, cw=240, ch=110;
      // cavity length arrow
      label('L ≈ 300 µm  (short cavity!)', cx+cw/2, cy-58, C.red, 15);
      arrow(cx+8, cy-44, cx+cw-8, cy-44, C.red, 1.5);
      arrow(cx+cw-8, cy-44, cx+8, cy-44, C.red, 1.5);
      // drive current
      for (let i=0;i<3;i++){
        const ix=cx+45+i*75, ph=(t*0.002+i*0.33)%1, iy=cy-36+ph*16;
        arrow(ix, cy-40, ix, cy-22, C.gold, 2);
      }
      label('electrical drive', cx+cw/2, cy-66, C.gold, 13);

      drawDFBChip(cx, cy, cw, ch);
      label('QW active region', cx+cw/2, cy+ch*0.5+5, C.yellow, 13);
      label('internal DFB grating', cx+cw/2, cy+ch+24, C.muted, 13);
      label('photons escape in ~ps', cx+cw/2, cy+ch+46, C.red, 14);

      // output beam
      const bx=cx+cw, by=cy+ch/2;
      ctx.strokeStyle='rgba(56,189,248,0.4)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(bx+150,by); ctx.stroke();
      photonsLine(bx, by, bx+150, by, t, 0.0005, C.blue, 4, 0);

      // spectrum
      drawLorentzian(500, 80, 200, 150, 0.20, C.red, '≈ 71 kHz', 'Output spectrum');
      label('broad & noisy', 600, 246, C.red, 14);

      // why-box
      const wx=730, wy=78, ww=210, wh=300;
      ctx.fillStyle='rgba(30,41,59,0.9)'; rr(wx,wy,ww,wh,8); ctx.fill();
      ctx.strokeStyle=C.border; ctx.lineWidth=1.3; rr(wx,wy,ww,wh,8); ctx.stroke();
      boldLabel('Why so broad?', wx+ww/2, wy+28, C.blue, 15);
      const lines=[
        ['Short cavity (300 µm)', C.muted],
        ['→ photons leave in ~ps', C.faint],
        ['', null],
        ['Each escape adds', C.muted],
        ['phase noise', C.faint],
        ['', null],
        ['Schawlow–Townes:', C.blue],
        ['  Δν ∝ 1 / τ_ph²', C.yellow],
        ['', null],
        ['α_H = 2.3 couples', C.muted],
        ['amplitude → phase,', C.faint],
        ['broadening further', C.faint],
      ];
      ctx.textAlign='left';
      lines.forEach((l,i)=>{ if(!l[0])return; ctx.fillStyle=l[1]; ctx.font=(l[1]===C.blue||l[1]===C.yellow?'bold ':'')+'14px "Segoe UI",sans-serif'; ctx.fillText(l[0], wx+16, wy+58+i*21); });
      ctx.textAlign='center';
    }
  },

  // ===== STEP 2 — Photon lifetime principle =====
  {
    title: 'The Key Idea — Photon Lifetime Controls Linewidth',
    keyColor: C.blue,
    key: 'Δν ∝ 1 / τ_ph²   ·   longer cavity → longer photon lifetime → narrower line',
    desc: 'The Schawlow–Townes relation says linewidth shrinks as the square of the photon lifetime, and τ_ph grows with cavity length. So if we keep photons circulating much longer before they escape, their random phase kicks average out and the linewidth collapses. The whole strategy of this paper is to give the DFB a giant external cavity — a 4-metre waveguide — so the effective photon lifetime grows by orders of magnitude. Same gain chip, dramatically more coherence.',
    draw(t) {
      ctx.fillStyle = C.bg; ctx.fillRect(0,0,W,H);
      boldLabel('The Photon-Lifetime Principle', W/2, 40, C.blue, 19);

      // short cavity

      ];
      const maxDv=71000;
      const barW=70, gap=58, baseY=area.y+area.h-44, maxBarH=area.h-90;
      const logMax=Math.log10(maxDv), logMin=Math.log10(0.1);
      const barY = v => baseY - ((Math.log10(v)-logMin)/(logMax-logMin))*maxBarH;

      devs.forEach((d,i)=>{
        const bx=area.x+40+i*(barW+gap);
        // free-running bar (faint)
        if (d.free){
          const fy=barY(d.free);
          ctx.fillStyle=d.color+'33'; rr(bx, fy, barW, baseY-fy, 3); ctx.fill();
          ctx.strokeStyle=d.color+'88'; ctx.lineWidth=1; rr(bx, fy, barW, baseY-fy, 3); ctx.stroke();
          label('free: '+fmtHz(d.free), bx+barW/2, fy-6, d.color, 12);
        }
        // locked bar (solid)
        const ly=barY(d.lock);
        const grad=ctx.createLinearGradient(bx,ly,bx,baseY);
        grad.addColorStop(0,d.color); grad.addColorStop(1,d.color+'55');
        ctx.fillStyle=grad; rr(bx+barW*0.18, ly, barW*0.64, baseY-ly, 3); ctx.fill();
        boldLabel(d.label, bx+barW/2, baseY+20, d.color, 14);
        label(d.note, bx+barW/2, baseY+38, C.faint, 11);
        boldLabel('locked '+fmtHz(d.lock), bx+barW/2, ly-6, d.color, 12);
      });
      label('Linewidth — log scale (faint = free-running, solid = feedback-locked)', area.x+area.w/2, area.y+area.h+12, C.faint, 11);
      label('Δν', area.x+14, area.y+20, C.muted, 13);

      // improvement arrow
      arrow(area.x+area.w+30, area.y+30, area.x+area.w+30, area.y+area.h-30, C.green, 2.5);
      ctx.save(); ctx.translate(area.x+area.w+18, area.y+area.h/2); ctx.rotate(-Math.PI/2);
      boldLabel('≈ 160,000×', 0, 0, C.green, 15); ctx.restore();

      // spectra stack
      drawLorentzian(560, 70, 180, 92, 0.26, C.red, '71 kHz', 'DFB (free)');
      drawLorentzian(560, 184, 180, 92, 0.09, C.yellow, '12 kHz', 'E-DBR (free)');
      drawLorentzian(560, 298, 180, 92, 0.012, C.greenL, '0.45 Hz', '4 m ECL (locked!)');

      // headline panel
      infoPanel(760, 70, 180, 320, 'Headline numbers', [
        ['Linewidth', '0.45 Hz', C.greenL],
        ['SMSR', '73 dB', C.green],
        ['NRF', '51.3 dB', C.green],
        {gap:6},
        ['Feedback tol.', '', C.muted],
        ['  sub-Hz to', '−8.1 dB', C.green],
        ['  stable to', '−11.8 dB', C.green],
        {gap:6},
        ['Platform', 'Si₃N₄', C.violet],
        ['Isolator', 'none!', C.greenL],
        {gap:6},
        ['vs fibre laser', 'on a chip', C.blue],
      ], C.green);
    }
  },
];

// ── State / UI ──────────────────────────────────────────────────────────────
let currentStep = 0, animId = null, startTime = null;
const dotsEl = document.getElementById('step-dots');
const controlsEl = document.getElementById('controls');
STEPS.forEach((s, i) => {
  const d = document.createElement('div');
  d.className = 'dot'; d.title = s.title; d.onclick = () => goTo(i);
  dotsEl.appendChild(d);
});

function updateUI(idx) {
  const s = STEPS[idx];
  document.getElementById('step-num').textContent = `STEP ${idx+1} OF ${STEPS.length}`;
  document.getElementById('step-title').textContent = s.title;
  document.getElementById('step-desc').textContent = s.desc;
  const kb = document.getElementById('key-box');
  kb.textContent = s.key; kb.style.borderColor = s.keyColor; kb.style.color = s.keyColor;
  document.getElementById('step-counter').textContent = `${idx+1} / ${STEPS.length}`;
  const prev = document.getElementById('btn-prev'), next = document.getElementById('btn-next');
  prev.disabled = idx === 0;
  next.textContent = idx === STEPS.length-1 ? '✓ Done' : 'Next →';
  next.classList.toggle('finish', idx === STEPS.length-1);
  document.querySelectorAll('.dot').forEach((d,i)=>{ d.classList.toggle('active', i===idx); d.classList.toggle('done', i<idx); });

  // controls
  if (s.interactive && s.controlsHTML) {
    controlsEl.innerHTML = s.controlsHTML;
    controlsEl.classList.add('active');
    if (s.bind) s.bind();
  } else {
    controlsEl.innerHTML = ''; controlsEl.classList.remove('active');
  }
}

function animate(ts) {
  if (!startTime) startTime = ts;
  const t = ts - startTime;
  ctx.clearRect(0,0,W,H);
  STEPS[currentStep].draw(t);
  animId = requestAnimationFrame(animate);
}
function goTo(idx) { currentStep = idx; startTime = null; updateUI(idx); }
document.getElementById('btn-prev').onclick = () => { if (currentStep>0) goTo(currentStep-1); };
document.getElementById('btn-next').onclick = () => { if (currentStep<STEPS.length-1) goTo(currentStep+1); };
document.addEventListener('keydown', e => {
  // don't hijack arrows while dragging a slider
  if (e.target && e.target.tagName === 'INPUT') return;
  if (e.key==='ArrowRight'||e.key===' ') { e.preventDefault(); if (currentStep<STEPS.length-1) goTo(currentStep+1); }
  if (e.key==='ArrowLeft') { e.preventDefault(); if (currentStep>0) goTo(currentStep-1); }
});

updateUI(0);
requestAnimationFrame(animate);
</script>
</body>
