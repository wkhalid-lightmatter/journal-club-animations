<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How a Sub-Hz Laser Works — Step by Step</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0a0f1e;
    color: #f1f5f9;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 12px 32px;
  }
  .page { max-width: 820px; width: 100%; }
  h1 {
    font-size: 1.25rem; font-weight: 700; color: #38bdf8;
    margin-bottom: 3px;
  }
  .paper-ref { font-size: 0.75rem; color: #475569; margin-bottom: 16px; }

  /* Step dots */
  .step-dots {
    display: flex; gap: 8px; justify-content: center; margin-bottom: 16px;
  }
  .dot {
    width: 28px; height: 6px; border-radius: 3px;
    background: #1e293b; border: 1px solid #334155;
    cursor: pointer; transition: all 0.2s;
  }
  .dot.active { background: #38bdf8; border-color: #38bdf8; }
  .dot.done { background: #0ea5e9; border-color: #0ea5e9; opacity: 0.55; }

  /* Canvas */
  .canvas-wrap {
    background: #0f172a;
    border: 1px solid #1e293b;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 16px;
    position: relative;
  }
  canvas { display: block; width: 100%; }

  /* Text area */
  .step-text {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 14px 18px;
    margin-bottom: 14px;
  }
  .step-num { font-size: 0.72rem; color: #38bdf8; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 5px; }
  .step-title { font-size: 1.15rem; font-weight: 700; margin-bottom: 8px; }
  .step-desc { font-size: 0.88rem; color: #cbd5e1; line-height: 1.65; }
  .key-box {
    margin-top: 10px; padding: 9px 14px;
    background: #0f172a; border-left: 3px solid #38bdf8;
    border-radius: 0 5px 5px 0; font-size: 0.85rem;
    color: #7dd3fc; font-family: monospace;
    transition: border-color 0.3s, color 0.3s;
  }

  /* Nav */
  .nav {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
  }
  .btn {
    padding: 9px 28px; border-radius: 6px; border: none; font-size: 0.92rem;
    font-weight: 700; cursor: pointer; transition: all 0.15s; min-width: 110px;
  }
  #btn-prev { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
  #btn-prev:hover:not(:disabled) { background: #334155; color: #f1f5f9; }
  #btn-prev:disabled { opacity: 0.35; cursor: default; }
  #btn-next { background: #0ea5e9; color: #fff; }
  #btn-next:hover { background: #38bdf8; }
  #btn-next.finish { background: #22c55e; }
  #btn-next.finish:hover { background: #4ade80; }
  .step-counter { font-size: 0.88rem; color: #475569; }
  sup { font-size: 0.65em; vertical-align: super; }
  sub { font-size: 0.65em; vertical-align: sub; }
</style>
</head>
<body>
<div class="page">
  <h1>Building a Sub-Hz Laser: From Diode to ECL</h1>
  <p class="paper-ref">Based on Dong et al., <em>Optica</em> 12(8), 1171 (2025)</p>

  <div class="step-dots" id="step-dots"></div>

  <div class="canvas-wrap">
    <canvas id="c" width="800" height="310"></canvas>
  </div>

  <div class="step-text">
    <div class="step-num" id="step-num">STEP 1 OF 6</div>
    <div class="step-title" id="step-title">The Bare DFB Laser</div>
    <div class="step-desc" id="step-desc"></div>
    <div class="key-box" id="key-box"></div>
  </div>

  <div class="nav">
    <button class="btn" id="btn-prev">← Back</button>
    <span class="step-counter" id="step-counter">1 / 6</span>
    <button class="btn" id="btn-next">Next →</button>
  </div>
</div>

<script>
// ── Colors ────────────────────────────────────────────────────────────────
const C = {
  bg:     '#0f172a',
  panel:  '#1e293b',
  border: '#334155',
  blue:   '#38bdf8',
  sky:    '#0ea5e9',
  green:  '#22c55e',
  yellow: '#fbbf24',
  orange: '#f97316',
  red:    '#f87171',
  violet: '#a78bfa',
  text:   '#f1f5f9',
  muted:  '#64748b',
  faint:  '#1e293b',
  gold:   '#d97706',
  goldL:  '#fbbf24',
  chip:   '#0c2340',
  chipBorder: '#1d6091',
  si3n4:  '#2d1b69',
  si3n4B: '#7c3aed',
  dbr:    '#1a2e1a',
  dbrB:   '#22c55e',
};

// ── Canvas utils ──────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

function rr(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function label(txt, x, y, color, size, align) {
  ctx.fillStyle = color || C.muted;
  ctx.font = (size || 11) + 'px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = align || 'center';
  ctx.fillText(txt, x, y);
}

function boldLabel(txt, x, y, color, size) {
  ctx.fillStyle = color || C.text;
  ctx.font = 'bold ' + (size || 12) + 'px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(txt, x, y);
}

function glowCircle(x, y, r, color, alpha) {
  const g = ctx.createRadialGradient(x, y, 0, x, y, r * 2.5);
  g.addColorStop(0, color.replace(')', `,${alpha})`).replace('rgb', 'rgba'));
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(x, y, r * 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = color;
  ctx.globalAlpha = alpha;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;
}

// ── Draw DFB chip ─────────────────────────────────────────────────────────
function drawDFBChip(x, y, w, h, showGrating) {
  // Body
  ctx.fillStyle = C.chip;
  rr(ctx, x, y, w, h, 4); ctx.fill();
  ctx.strokeStyle = C.chipBorder; ctx.lineWidth = 1.5;
  rr(ctx, x, y, w, h, 4); ctx.stroke();

  // Active region
  const arY = y + h * 0.38, arH = h * 0.24;
  ctx.fillStyle = 'rgba(251,191,36,0.12)';
  ctx.fillRect(x + 4, arY, w - 8, arH);
  ctx.strokeStyle = 'rgba(251,191,36,0.5)'; ctx.lineWidth = 1;
  ctx.strokeRect(x + 4, arY, w - 8, arH);

  // Grating lines
  if (showGrating !== false) {
    ctx.strokeStyle = 'rgba(56,189,248,0.25)'; ctx.lineWidth = 0.8;
    for (let i = 1; i < 16; i++) {
      const gx = x + (i / 16) * w;
      ctx.beginPath(); ctx.moveTo(gx, y + 6); ctx.lineTo(gx, y + h - 6); ctx.stroke();
    }
  }

  // Top contact
  const grd = ctx.createLinearGradient(x, y - 14, x, y - 2);
  grd.addColorStop(0, '#92400e'); grd.addColorStop(1, C.gold);
  ctx.fillStyle = grd;
  rr(ctx, x - 4, y - 16, w + 8, 14, 2); ctx.fill();

  // Bottom contact
  ctx.fillStyle = '#78350f';
  ctx.fillRect(x - 4, y + h + 2, w + 8, 6);
}

// ── Draw Si3N4 chip ───────────────────────────────────────────────────────
function drawSiChip(x, y, size) {
  ctx.fillStyle = C.si3n4;
  rr(ctx, x, y, size, size, 6); ctx.fill();
  ctx.strokeStyle = C.si3n4B; ctx.lineWidth = 1.5;
  rr(ctx, x, y, size, size, 6); ctx.stroke();
  boldLabel('Si₃N₄', x + size / 2, y + size + 14, C.violet, 10);
  label('chip', x + size / 2, y + size + 26, C.muted, 9);
}

// ── Draw DBR block ────────────────────────────────────────────────────────
function drawDBR(x, y, w, h) {
  ctx.fillStyle = C.dbr;
  rr(ctx, x, y, w, h, 4); ctx.fill();
  ctx.strokeStyle = C.dbrB; ctx.lineWidth = 1.5;
  rr(ctx, x, y, w, h, 4); ctx.stroke();
  // Chevron grating
  ctx.strokeStyle = 'rgba(34,197,94,0.4)'; ctx.lineWidth = 1;
  const rows = 5;
  for (let r = 0; r < rows; r++) {
    const gy = y + (r + 0.5) * h / rows;
    for (let i = 0; i < 5; i++) {
      const gx = x + 4 + i * (w - 8) / 4;
      ctx.beginPath();
      ctx.moveTo(gx, gy - 3); ctx.lineTo(gx + (w - 8) / 8, gy); ctx.lineTo(gx, gy + 3);
      ctx.stroke();
    }
  }
  boldLabel('DBR', x + w / 2, y + h + 14, C.green, 10);
}

// ── Draw Lorentzian spectrum ──────────────────────────────────────────────
function drawLorentzian(x, y, w, h, normFwhm, color, fwhmLabel, noiseLevel) {
  ctx.save();
  // Box
  ctx.fillStyle = 'rgba(0,0,0,0.3)'; rr(ctx, x, y, w, h, 4); ctx.fill();
  ctx.strokeStyle = '#334155'; ctx.lineWidth = 1; rr(ctx, x, y, w, h, 4); ctx.stroke();

  const px = (f) => x + w / 2 + f * w;
  const lorentz = (f) => 1 / (1 + Math.pow(f / normFwhm, 2));

  // Noise floor
  if (noiseLevel) {
    ctx.strokeStyle = 'rgba(100,116,139,0.4)'; ctx.lineWidth = 0.8;
    ctx.setLineDash([3, 3]);
    const ny = y + h - noiseLevel * (h - 24) - 8;
    ctx.beginPath(); ctx.moveTo(x + 4, ny); ctx.lineTo(x + w - 4, ny); ctx.stroke();
    ctx.setLineDash([]);
  }

  // Fill
  ctx.beginPath();
  ctx.moveTo(px(-0.5), y + h - 8);
  for (let i = 0; i <= 100; i++) {
    const f = -0.5 + i / 100;
    const amp = lorentz(f) * (h - 24) * 0.90;
    ctx.lineTo(px(f), y + h - 8 - amp);
  }
  ctx.lineTo(px(0.5), y + h - 8);
  ctx.closePath();
  ctx.fillStyle = color + '25';
  ctx.fill();

  // Stroke
  ctx.strokeStyle = color; ctx.lineWidth = 2;
  ctx.beginPath();
  for (let i = 0; i <= 100; i++) {
    const f = -0.5 + i / 100;
    const amp = lorentz(f) * (h - 24) * 0.90;
    i === 0 ? ctx.moveTo(px(f), y + h - 8 - amp) : ctx.lineTo(px(f), y + h - 8 - amp);
  }
  ctx.stroke();

  // FWHM bracket
  const peakY = y + h - 8 - (h - 24) * 0.90;
  const halfY = y + h - 8 - (h - 24) * 0.45;
  const hw = normFwhm * w;
  if (hw > 8) {
    ctx.strokeStyle = C.yellow; ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(px(-normFwhm), halfY - 4); ctx.lineTo(px(-normFwhm), halfY + 4); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(px(normFwhm),  halfY - 4); ctx.lineTo(px(normFwhm),  halfY + 4); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(px(-normFwhm), halfY); ctx.lineTo(px(normFwhm), halfY); ctx.stroke();
  }

  // Label
  if (fwhmLabel) {
    ctx.fillStyle = C.yellow;
    ctx.font = 'bold 10px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Δν = ' + fwhmLabel, x + w / 2, y + h - 1);
  }

  ctx.restore();
}

// ── Photon along a straight path ──────────────────────────────────────────
function photonsLine(x1, y1, x2, y2, t, speed, color, n, spread) {
  speed = speed || 0.0004;
  n = n || 5; spread = spread || 0;
  for (let i = 0; i < n; i++) {
    const frac = ((t * speed + i / n) % 1);
    const px = x1 + frac * (x2 - x1);
    const py = y1 + frac * (y2 - y1) + spread * Math.sin(i * 1.7 + frac * 3);
    const alpha = Math.min(1, Math.sin(frac * Math.PI) * 1.6);
    glowCircle(px, py, 3, color, alpha * 0.85);
  }
}

// ── Draw a spiral path (returns points) ──────────────────────────────────
function spiralPoints(cx, cy, r0, r1, turns, npts) {
  const pts = [];
  for (let i = 0; i <= npts; i++) {
    const θ = (i / npts) * turns * 2 * Math.PI;
    const r = r0 + (r1 - r0) * (i / npts);
    pts.push([cx + r * Math.cos(θ - Math.PI / 2), cy + r * Math.sin(θ - Math.PI / 2)]);
  }
  return pts;
}

function drawSpiralPath(pts, color, lw) {
  ctx.strokeStyle = color || C.violet;
  ctx.lineWidth = lw || 1.8;
  ctx.beginPath();
  pts.forEach((p, i) => i === 0 ? ctx.moveTo(p[0], p[1]) : ctx.lineTo(p[0], p[1]));
  ctx.stroke();
}

function photonAlongPath(pts, frac, color) {
  const idx = Math.min(pts.length - 2, Math.floor(frac * (pts.length - 1)));
  const t2 = frac * (pts.length - 1) - idx;
  const p = pts[idx], q = pts[idx + 1];
  const x = p[0] + t2 * (q[0] - p[0]);
  const y = p[1] + t2 * (q[1] - p[1]);
  glowCircle(x, y, 3.5, color, 0.9);
}

// ── Annotation arrow ──────────────────────────────────────────────────────
function annotationArrow(x1, y1, x2, y2, color) {
  ctx.strokeStyle = color || C.muted;
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 3]);
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  ctx.setLineDash([]);
  // arrowhead
  const angle = Math.atan2(y2 - y1, x2 - x1);
  ctx.fillStyle = color || C.muted;
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - 8 * Math.cos(angle - 0.4), y2 - 8 * Math.sin(angle - 0.4));
  ctx.lineTo(x2 - 8 * Math.cos(angle + 0.4), y2 - 8 * Math.sin(angle + 0.4));
  ctx.closePath(); ctx.fill();
}

// ── STEP DEFINITIONS ──────────────────────────────────────────────────────
const STEPS = [
  {
    num: 1, title: 'The Bare DFB Laser',
    keyColor: '#f87171',
    key: 'Δν (free-running) ≈ 76 kHz  ·  τ_ph ≈ a few picoseconds',
    desc: 'A Distributed-Feedback (DFB) diode laser uses an internal grating etched along the active waveguide to select a single emission wavelength. Current flows through the top gold contact into the quantum-well (QW) active region — electrons and holes recombine to create photons. The grating acts as a built-in mirror that bounces light back and forth. But this "resonator" is only ~300 µm long — photons escape after just a few picoseconds. That short lifetime means the laser has broad, noisy linewidth (~76 kHz).',
    draw(t) {
      ctx.fillStyle = C.bg; ctx.fillRect(0, 0, W, H);

      // Title label
      boldLabel('Free-running DFB', 160, 28, C.blue, 13);

      // DFB chip
      const cx = 60, cy = 100, cw = 180, ch = 80;
      drawDFBChip(cx, cy, cw, ch);
      label('QW active region', cx + cw / 2, cy + ch * 0.5 + 3, C.yellow, 9);
      label('DFB grating (λ/4n spacing)', cx + cw / 2, cy + ch + 18, C.muted, 9);
      label('L ≈ 300 µm', cx + cw / 2, cy + ch + 30, C.muted, 9);

      // Current arrows
      for (let i = 0; i < 3; i++) {
        const ix = cx + 30 + i * 60;
        const phase = (t * 0.002 + i * 0.33) % 1;
        const iy = cy - 32 + phase * 20;
        ctx.strokeStyle = C.gold; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(ix, cy - 40); ctx.lineTo(ix, cy - 18); ctx.stroke();
        // arrowhead
        ctx.fillStyle = C.gold;
        ctx.beginPath();
        ctx.moveTo(ix, cy - 18);
        ctx.lineTo(ix - 4, cy - 24); ctx.lineTo(ix + 4, cy - 24);
        ctx.closePath(); ctx.fill();
      }
      label('Electrical drive', cx + cw / 2, cy - 50, C.gold, 9);

      // Output beam
      const bx = cx + cw, by = cy + ch / 2;
      // beam cone
      for (let i = 0; i < 7; i++) {
        const angle = (i - 3) * 0.07;
        const spread = 260;
        ctx.strokeStyle = `rgba(56,189,248,0.04)`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(bx, by);
        ctx.lineTo(bx + spread * Math.cos(angle), by + spread * Math.sin(angle));
        ctx.stroke();
      }
      // main beam
      ctx.strokeStyle = 'rgba(56,189,248,0.35)'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(bx + 260, by); ctx.stroke();

      photonsLine(bx, by, bx + 255, by, t, 0.00038, C.blue, 5, 0);

      // τ_ph annotation
      label('τ_ph ≈ few ps', cx + cw / 2, cy - 68, '#f87171', 10);
      ctx.strokeStyle = '#f87171'; ctx.lineWidth = 1;
      ctx.setLineDash([3, 3]);
      ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx, cy + ch); ctx.stroke(); // left facet
      ctx.beginPath(); ctx.moveTo(cx + cw, cy); ctx.lineTo(cx + cw, cy + ch); ctx.stroke(); // right facet
      ctx.setLineDash([]);
      // double arrow for cavity length
      ctx.strokeStyle = '#f87171'; ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(cx + 6, cy - 60); ctx.lineTo(cx + cw - 6, cy - 60); ctx.stroke();
      // arrowheads
      ctx.fillStyle = '#f87171';
      ctx.beginPath(); ctx.moveTo(cx + 6, cy - 60); ctx.lineTo(cx + 14, cy - 55); ctx.lineTo(cx + 14, cy - 65); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx + cw - 6, cy - 60); ctx.lineTo(cx + cw - 14, cy - 55); ctx.lineTo(cx + cw - 14, cy - 65); ctx.closePath(); ctx.fill();
      label('L ≈ 300 µm (short!)', cx + cw / 2, cy - 72, '#f87171', 9);

      // Spectrum
      drawLorentzian(310, 60, 190, 130, 0.18, '#f87171', '76 kHz', 0.07);
      boldLabel('Output spectrum', 405, 56, C.muted, 10);
      label('Broad, noisy', 405, 208, '#f87171', 10);

      // Photon lifetime explanation box
      const bx2 = 516, by2 = 60, bw2 = 270, bh2 = 200;
      ctx.fillStyle = 'rgba(30,41,59,0.7)';
      rr(ctx, bx2, by2, bw2, bh2, 6); ctx.fill();
      ctx.strokeStyle = '#334155'; ctx.lineWidth = 1;
      rr(ctx, bx2, by2, bw2, bh2, 6); ctx.stroke();
      boldLabel('Why is linewidth broad?', bx2 + bw2 / 2, by2 + 18, C.blue, 10);
      const lines = [
        '• Short cavity (300 µm) → photons',
        '  escape in ~ps',
        '• Each escape event adds phase noise',
        '• Schawlow–Townes:',
        '  Δν ∝ 1 / τ_ph²',
        '• Also: linewidth enhancement',
        '  factor α_H = 2.3 (amplitude-',
        '  phase coupling) broadens further',
      ];
      ctx.fillStyle = '#94a3b8';
      ctx.font = '9.5px "Segoe UI", system-ui, sans-serif';
      ctx.textAlign = 'left';
      lines.forEach((l, i) => ctx.fillText(l, bx2 + 12, by2 + 36 + i * 18));

      label('α_H = 2.3  →  ×(1 + α_H²) broader', bx2 + bw2 / 2, by2 + bh2 - 8, '#fbbf24', 9);
    }
  },
  {
    num: 2, title: 'Why Cavity Length Controls Linewidth',
    keyColor: '#38bdf8',
    key: 'Δν ∝ 1/τ_ph²  ·  Longer cavity → longer τ_ph → narrower linewidth',
    desc: 'The Schawlow–Townes formula says linewidth scales as 1/τ_ph². The photon lifetime τ_ph = 2nL/c — it grows linearly with cavity length L. So doubling cavity length gives 4× narrower linewidth. A 4-meter external waveguide makes the effective cavity ~13,000× longer than the bare DFB chip. This is the core idea: we want photons to circulate for as long as possible before escaping, giving the optical field time to build up its coherence.',
    draw(t) {
      ctx.fillStyle = C.bg; ctx.fillRect(0, 0, W, H);
      boldLabel('The Photon Lifetime Principle', W / 2, 28, C.blue, 14);

      // Short cavity box (left)
      const s = { x: 50, y: 80, w: 240, h: 160 };
      ctx.fillStyle = 'rgba(127,29,29,0.2)';
      rr(ctx, s.x, s.y, s.w, s.h, 6); ctx.fill();
      ctx.strokeStyle = '#f87171'; ctx.lineWidth = 1.5;
      rr(ctx, s.x, s.y, s.w, s.h, 6); ctx.stroke();
      boldLabel('Short Cavity  (~300 µm)', s.x + s.w / 2, s.y - 10, '#f87171', 11);

      // Photons bouncing fast
      const numS = 3;
      for (let i = 0; i < numS; i++) {
        const phase = ((t * 0.0012 + i / numS) % 1);
        const px2 = s.x + 16 + (phase < 0.5 ? phase * 2 : (1 - phase) * 2) * (s.w - 32);
        const py2 = s.y + 40 + i * 35;
        glowCircle(px2, py2, 4, '#f87171', 0.85);
      }
      // Leaking photons
      for (let i = 0; i < 4; i++) {
        const lp = ((t * 0.001 + i * 0.25) % 1);
        if (lp > 0.8) {
          const lx = s.x + s.w + (lp - 0.8) * 5 * 120;
          const ly = s.y + 40 + i * 35;
          glowCircle(lx, ly, 3, '#f87171', (1 - lp) * 4);
        }
      }
      label('Photons escape quickly', s.x + s.w / 2, s.y + s.h + 14, '#f87171', 10);
      label('τ_ph ≈ a few ps', s.x + s.w / 2, s.y + s.h + 26, '#f87171', 9);
      label('→ Δν ≈ 76 kHz', s.x + s.w / 2, s.y + s.h + 40, '#f87171', 11);

      // Long cavity box (right)
      const l2 = { x: 450, y: 80, w: 320, h: 160 };
      ctx.fillStyle = 'rgba(5,46,22,0.3)';

      });

      // Y-axis label
      label('Linewidth (log scale)', bArea.x - 4, bArea.y + bArea.h / 2, C.muted, 9);
      // Log axis ticks
      const ticks = [[76000,'76 kHz'],[12000,'12 kHz'],[1000,'1 kHz'],[1,'1 Hz'],[0.45,'0.45 Hz']];
      ticks.forEach(([val, lbl]) => {
        const ty = baseY - (Math.log10(val) / Math.log10(maxDv)) * maxBarH;
        if (ty < bArea.y + 10) return;
        ctx.strokeStyle = 'rgba(51,65,85,0.5)'; ctx.lineWidth = 0.5;
        ctx.setLineDash([3, 4]);
        ctx.beginPath(); ctx.moveTo(bArea.x + 10, ty); ctx.lineTo(bArea.x + bArea.w - 10, ty); ctx.stroke();
        ctx.setLineDash([]);
        label(lbl, bArea.x + 6, ty + 3, C.muted, 7, 'right');
      });

      // Improvement arrow
      const imp = { x: bArea.x + bArea.w + 15, y: 70, w: 60, h: 190 };
      ctx.strokeStyle = C.green; ctx.lineWidth = 2;
      annotationArrow(imp.x + imp.w / 2, imp.y + 10, imp.x + imp.w / 2, imp.y + imp.h, C.green);
      ctx.save(); ctx.translate(imp.x + imp.w / 2 - 12, imp.y + imp.h / 2); ctx.rotate(-Math.PI / 2);
      boldLabel('170,000×', 0, 0, C.green, 11);
      ctx.restore();
      label('improvement', imp.x + imp.w / 2, imp.y + imp.h + 12, C.green, 9);

      // Spectrum comparison (right)
      const scX = 540, scY = 55;
      drawLorentzian(scX, scY, 120, 80, 0.25, '#f87171', '', 0);
      label('76 kHz (DFB)', scX + 60, scY - 6, '#f87171', 9);
      drawLorentzian(scX, scY + 88, 120, 80, 0.07, '#fbbf24', '', 0);
      label('12 kHz (E-DBR)', scX + 60, scY + 82, '#fbbf24', 9);
      drawLorentzian(scX, scY + 175, 120, 80, 0.008, '#4ade80', '', 0);
      label('0.45 Hz (4 m ECL!)', scX + 60, scY + 169, '#4ade80', 9);

      // Big number
      const bny = 276;
      ctx.fillStyle = 'rgba(5,46,22,0.7)';
      rr(ctx, 50, bny, bArea.w, 28, 4); ctx.fill();
      ctx.fillStyle = C.green;
      ctx.font = 'bold 13px "Segoe UI", system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Δν = 0.45 Hz · NRF = 51.3 dB · Isolator-free hybrid integration on Si₃N₄', bArea.x + bArea.w / 2, bny + 18);
    }
  },
];

// ── State ─────────────────────────────────────────────────────────────────
let currentStep = 0;
let animId = null;
let startTime = null;

// ── Build step dots ───────────────────────────────────────────────────────
const dotsEl = document.getElementById('step-dots');
STEPS.forEach((s, i) => {
  const d = document.createElement('div');
  d.className = 'dot';
  d.title = s.title;
  d.onclick = () => goTo(i);
  dotsEl.appendChild(d);
});

// ── Update UI ─────────────────────────────────────────────────────────────
function updateUI(idx) {
  const s = STEPS[idx];
  document.getElementById('step-num').textContent = `STEP ${idx + 1} OF ${STEPS.length}`;
  document.getElementById('step-title').textContent = s.title;
  document.getElementById('step-desc').textContent = s.desc;
  const kb = document.getElementById('key-box');
  kb.textContent = s.key;
  kb.style.borderColor = s.keyColor;
  kb.style.color = s.keyColor;
  document.getElementById('step-counter').textContent = `${idx + 1} / ${STEPS.length}`;

  const prev = document.getElementById('btn-prev');
  const next = document.getElementById('btn-next');
  prev.disabled = idx === 0;
  next.textContent = idx === STEPS.length - 1 ? '✓ Done' : 'Next →';
  next.classList.toggle('finish', idx === STEPS.length - 1);

  document.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i === idx);
    d.classList.toggle('done', i < idx);
  });
}

// ── Animation loop ────────────────────────────────────────────────────────
function animate(ts) {
  if (!startTime) startTime = ts;
  const t = ts - startTime;
  ctx.clearRect(0, 0, W, H);
  STEPS[currentStep].draw(t);
  animId = requestAnimationFrame(animate);
}

function goTo(idx) {
  currentStep = idx;
  startTime = null;
  updateUI(idx);
}

document.getElementById('btn-prev').onclick = () => { if (currentStep > 0) goTo(currentStep - 1); };
document.getElementById('btn-next').onclick = () => { if (currentStep < STEPS.length - 1) goTo(currentStep + 1); };

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') {
    e.preventDefault();
    if (currentStep < STEPS.length - 1) goTo(currentStep + 1);
  }
  if (e.key === 'ArrowLeft') {
    e.preventDefault();
    if (currentStep > 0) goTo(currentStep - 1);
  }
});

// ── Start ─────────────────────────────────────────────────────────────────
updateUI(0);
requestAnimationFrame(animate);
</script>
</body>
</html>
